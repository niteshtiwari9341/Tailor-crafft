<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Success</title>

<style>
/* Page Background */
body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1A243F, #3A7BD5);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Main Box */
.success-box {
  background: #ffffff;
  padding: 40px 50px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  animation: fadeUp 0.7s ease;
}

/* Heading */
.success-title {
  color: #28a745;
  font-size: 30px;
  margin-bottom: 10px;
}

/* Text */
.success-msg {
  color: #555;
  font-size: 16px;
  margin-bottom: 25px;
}

/* Button */
.home-btn {
  display: inline-block;
  padding: 12px 25px;
  background: #1A243F;
  color: #fff;
  text-decoration: none;
  border-radius: 8px;
  font-size: 15px;
  transition: all 0.3s ease;
}

/* Hover Effect */
.home-btn:hover {
  background: #0f172a;
  transform: translateY(-3px);
}

/* Animation */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

</head>

<body>

<div class="success-box">
  <h1 class="success-title"> Order Placed Successfully</h1>
  <p class="success-msg">
    Thank you! Your order has been received.<br>
    We will contact you soon.
  </p>

  <a href="index.html" class="home-btn"> Go to Home</a>
</div>

</body>
</html>
